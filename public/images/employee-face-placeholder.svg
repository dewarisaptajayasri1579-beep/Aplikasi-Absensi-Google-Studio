<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Circular background -->
  <circle cx="100" cy="100" r="95" fill="#EEF5FF" stroke="#DCE4F0" stroke-width="2" />
  
  <g transform="translate(0, 10)">
    <!-- Shoulders / Shirt -->
    <path d="M40 160 C40 120, 160 120, 160 160 Z" fill="#0F5FEA" />
    <path d="M90 125 L100 138 L110 125 Z" fill="#FDBA74" />
    <path d="M100 138 L100 155" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="2,2" />

    <!-- Neck -->
    <rect x="88" y="105" width="24" height="25" fill="#FDBA74" />

    <!-- Head / Face -->
    <circle cx="100" cy="80" r="32" fill="#FDBA74" />

    <!-- Hair -->
    <path d="M68 80 C65 62, 85 50, 100 48 C115 46, 132 55, 132 75 C124 73, 116 72, 112 76 C106 80, 100 70, 92 72 C84 74, 76 72, 68 80 Z" fill="#1E293B" />
    <!-- Sideburns -->
    <path d="M68 76 L68 85 L73 83 Z" fill="#1E293B" />
    <path d="M132 76 L132 85 L127 83 Z" fill="#1E293B" />

    <!-- Eyes -->
    <circle cx="89" cy="80" r="3" fill="#1E293B" />
    <circle cx="111" cy="80" r="3" fill="#1E293B" />

    <!-- Eyebrows -->
    <path d="M82 72 C85 70, 93 71, 95 74" fill="none" stroke="#1E293B" stroke-width="2" stroke-linecap="round" />
    <path d="M118 72 C115 70, 107 71, 105 74" fill="none" stroke="#1E293B" stroke-width="2" stroke-linecap="round" />

    <!-- Nose -->
    <path d="M100 78 L100 86 C100 86, 98 88, 100 88" fill="none" stroke="#E28743" stroke-width="2" stroke-linecap="round" />

    <!-- Smile -->
    <path d="M92 94 C95 100, 105 100, 108 94" fill="none" stroke="#1E293B" stroke-width="2.5" stroke-linecap="round" />
    
    <!-- Ears -->
    <circle cx="67" cy="82" r="7" fill="#FDBA74" />
    <circle cx="133" cy="82" r="7" fill="#FDBA74" />
  </g>
</svg>
