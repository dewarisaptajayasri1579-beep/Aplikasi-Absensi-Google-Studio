<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 80" width="100%" height="100%">
  <!-- Background is handled by container, this is just the decorative right illustration -->
  <g transform="translate(10, 0)">
    <!-- Decorative clouds/circles -->
    <circle cx="100" cy="40" r="30" fill="#E0F2FE" opacity="0.6" />
    <circle cx="130" cy="50" r="20" fill="#E0F2FE" opacity="0.4" />

    <!-- Smartphone -->
    <g transform="translate(90, 15) rotate(10)">
      <rect x="0" y="0" width="22" height="42" rx="4" fill="#0F1F3D" />
      <rect x="1.5" y="2" width="19" height="38" rx="2.5" fill="#FFFFFF" />
      <!-- Location Pin inside phone -->
      <path d="M11 12 C9 12 7.5 13.5 7.5 15.5 C7.5 18 11 22 11 22 C11 22 14.5 18 14.5 15.5 C14.5 13.5 13 12 11 12 Z" fill="#0F5FEA" />
      <circle cx="11" cy="15.5" r="1.5" fill="#FFFFFF" />
      
      <!-- Tiny camera indicator -->
      <circle cx="11" cy="30" r="3" fill="#EEF5FF" stroke="#0F5FEA" stroke-width="1.5" />
      <circle cx="11" cy="30" r="1" fill="#0F5FEA" />
    </g>

    <!-- Additional Floating Location Pin -->
    <g transform="translate(68, 20)">
      <path d="M8 3 C5.8 3 4 4.8 4 7 C4 9.8 8 14 8 14 C8 14 12 9.8 12 7 C12 4.8 10.2 3 8 3 Z" fill="#FF4D4D" />
      <circle cx="8" cy="7" r="1.5" fill="#FFFFFF" />
    </g>

    <!-- Floating Camera Icon -->
    <g transform="translate(118, 38)">
      <rect x="0" y="0" width="16" height="12" rx="2" fill="#10B981" />
      <path d="M4 0 L12 0 L10 3 L6 3 Z" fill="#10B981" />
      <circle cx="8" cy="6" r="3" fill="#FFFFFF" />
      <circle cx="8" cy="6" r="1.5" fill="#10B981" />
    </g>
  </g>
</svg>
